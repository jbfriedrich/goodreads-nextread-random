# Reverse proxy: public :80 -> Go backend on 127.0.0.1:8080 (same container).
# SSL is terminated upstream (handled by your existing setup), so this only
# speaks plain HTTP.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Random-book page (and everything else) is rendered by the Go backend.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
        access_log off;
    }
}
